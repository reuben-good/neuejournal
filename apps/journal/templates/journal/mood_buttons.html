<script>
function handleHappiness(level) {
  const day = String(date.getDate()).padStart(2, '0');
  const month = String(date.getMonth() + 1).padStart(2, '0');
  const moodURL = baseUrl.replace('DAY', day).replace('MONTH', month).replace('YEAR', date.getFullYear()).replace('entry', 'mood').replace("/save", "");
  fetch(moodURL + "/" + level, {
    method: "POST",
    headers: {
      "Content-type": "text/plain",
      'X-CSRFToken': csrfToken
    },
  })
}

const buttons = document.getElementById("mood-btns").children
for (const button in buttons) {
  buttons[button].onclick = function() {
    handleHappiness(buttons[button].id)
  }
}
</script>
