{% extends "_base.html" %} {% block content %}
<div id="content">
    <h2 id="title">{{ date }}</h2>
    <div id="editor">
    </div>
</div>

<div id="sidebar">
    {% include "journal/datepicker.html" %}
</div>

<script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
<script>
const options = {
  modules: {
    toolbar: false,
  },
  placeholder: 'Today I...',
  theme: 'snow'
};
const quill = new Quill('#editor', options);
</script>

{% if content %}
<script>
quill.setContents([
  { insert: '{{content}}' },
  { insert: '\n' }
])
</script>
{% endif %}

<script>
function getCookie(name) {
    const value = `; ${document.cookie}`;
    const parts = value.split(`; ${name}=`);
    if (parts.length === 2) return parts.pop().split(';').shift();
}

async function save() {
  const csrfToken = getCookie('csrftoken');
  await fetch(window.location.origin + window.location.pathname, {
    method: "POST",
    headers: {
      "Content-type": "text/plain",
      'X-CSRFToken': csrfToken
    },
    body: quill.getText(),
  })
}

// Run logCurrentTime every 1000ms (1 second)
const intervalId = setInterval(save, 1000);
</script>
{% endblock content %}
