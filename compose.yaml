services:
  db:
    image: postgres:latest
    restart: always
    env_file: ".env"
    ports:
      - ${POSTGRES_PORT}:5432
    volumes:
      - ./postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${DATABASE_NAME}"]
      interval: 1s
      timeout: 5s
      retries: 10
